name: Codex Issue Debug

on:
  issues:
    types: [opened, reopened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  debug:
    if: >
      (
        github.event_name == 'issues' &&
        (
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association) ||
          (github.event.action == 'labeled' && github.event.label.name == 'codex-debug')
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/codex-debug') &&
        (
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) ||
          contains(github.event.issue.labels.*.name, 'codex-debug')
        )
      )
    runs-on: [self-hosted, macOS, mobile-agent-debugger]
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Run Codex debugger
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          REPO: ${{ github.repository }}
          ANDROID_AVD_NAME: ${{ vars.ANDROID_AVD_NAME || 'Pixel_8_API_35' }}
        run: scripts/automation/codex-debug-issue.sh
